<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card</title>
    <link rel="stylesheet" href="charactercard.css">
    <script src="charactercard.js" defer></script>
</head>
<body>
    <img id="courseLogo" height="500" width="500" src="snortleblat.webp" alt="Snortleblat, Swamp Beast Diplomat">
    <h1 id="courseName">Snortleblat</h1>
    <div>
        <table>
          <tbody>
            <tr>
              <th>Class:</th>
              <td id="classValue"></td>
            </tr>
            <tr>
              <th>Level:</th>
              <td id="levelValue"></td>
            </tr>
            <tr>
              <th>Health:</th>
              <td id="healthValue"></td>
            </tr>
          </tbody>
        </table>
        <button class="attacked button">Attacked</button>
        <button class="level-up button">Level Up</button>
    </div>
</body>
</html>
